<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-tasks"></i>
                Gerenciador de Tarefas
            </h1>
        </header>

        <div class="add-task-section">
            <h2>Adicionar Nova Tarefa</h2>
            <form id="taskForm">
                <div class="form-group">
                    <input type="text" id="taskTitle" placeholder="Título da tarefa" required>
                </div>
                <div class="form-group">
                    <textarea id="taskDescription" placeholder="Descrição da tarefa" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Adicionar Tarefa
                </button>
            </form>
        </div>

        <div class="tasks-section">
            <h2>Minhas Tarefas</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendentes</button>
                <button class="filter-btn" data-filter="completed">Concluídas</button>
            </div>
            <div id="tasksList" class="tasks-list">
                <!-- As tarefas serão carregadas aqui via JavaScript -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
